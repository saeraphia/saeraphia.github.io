<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="CyberDeck">
    <meta name="description" content="Lost and Found System for UiTM Sarawak KS2">
    <link rel="stylesheet" href="style.css">
    <script src="anim.js" defer></script>
    <title>FindIt Portal</title>
  </head>
  <body>
    <!-- A copy paste draft -->
    <header>
      <a href="#home" class="logo">FindIt Portal</a>
      <i class='bx bx-menu' id="menu-icon"></i>
      <nav class="navbar">
        <a href="#home" class="active">Home</a>
        <a href="found list.html">Browse Item</a>
        <a href="about us.html">About Us</a>
        <a href="report.html">Report</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <!-- Content here -->
<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- ── FORM CARD ── -->
  <div class="form-card">
    <div class="card-top">
      <h2>Item Report Form</h2>
      <!-- Status Tabs -->
      <div class="status-tabs" role="tablist">
        <button class="tab active" onclick="switchTab('lost', this)" role="tab">Lost</button>
        <button class="tab" onclick="switchTab('found', this)" role="tab">Found</button>
      </div>
    </div>

    <div class="card-body">
      <form onsubmit="return handleSubmit(event)">

        <!-- Where -->
        <div class="field-row single">
          <div class="field">
            <label>Where?</label>
            <div class="input-icon-wrap">
              <input type="text" id="where">
            </div>
          </div>
        </div>

        <!-- When & Category -->
        <div class="field-row" style="margin-top:18px">
          <div class="field">
            <label>When?</label>
            
			<div>
				<input type="date" id="when" required>
			</div>
          </div>
          <div class="field">
            <label>Category</label>
            <select id="category" required>
              <option value="">Select a category</option>
              <option>Bag / Luggage</option>
              <option>Wallet / Purse</option>
              <option>Phone / Electronics</option>
              <option>Keys</option>
              <option>Jewellery / Watch</option>
              <option>Documents / ID</option>
              <option>Clothing / Accessories</option>
              <option>Toy / Stuffed Animal</option>
              <option>Sports Equipment</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="field-row single" style="margin-top:18px">
          <div class="field">
			<label>Description</label><br>
            <textarea id="description" name="description" rows="4" cols="30"
			placeholder="Describe the item: colour, brand, features..."></textarea>
          </div>
        </div>
		</form>

    <!-- Add Button -->
	<div>
		<button type="submit" class="add-btn">Add Item</button>
	</div>

    <!-- Footer -->
    <footer class="footer">
      <div class="navigation">
        <h4>Navigation</h4>
        <a href="index.html">Home</a>
        <a href="about us.html">About Us</a>
        <a href="login.html">Login</a>
      </div>
      <p class="copywrite">© 2026 CyberDeck. All rights reserved.</p>
    </footer>
  </body>
</html>
