<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- ── FORM CARD ── -->
  <div class="form-card">
    <div class="card-top">
      <h2>Item Report</h2>
      <!-- Status Tabs -->
      <div class="status-tabs" role="tablist">
        <button class="tab active" onclick="switchTab('lost', this)" role="tab">Lost</button>
        <button class="tab" onclick="switchTab('found', this)" role="tab">Found</button>
      </div>
    </div>

    <div class="card-body">
      <form novalidate>

        <!-- WHERE -->
        <div class="field-row single">
          <div class="field">
            <label>Where</label>
            <select id="location-type" required>
              <option value="">Select location</option>
              <option>Block A</option>
              <option>Block B</option>
              <option>Block C</option>
              <option>Bilik Seminar Utama</option>
              <option>Perpustakaan Tun Abdul Razak (PTAR)</option>
              <option>Kolej Seri Pinang 1</option>
              <option>Kolej Seri Pinang 2</option>
              <option>Medan Selera</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <!-- DATE,TIME & CATEGORY -->
        <div class="field-row" style="margin-top:18px">
          <div class="field">
            <label>Date</label>
            <input type="date" id="date" required>
          </div>

          <div class="field">
            <label>Time</label>
            <input type="time" id="time" required>
          </div>
        </div>

        <div class="field-row single" style="margin-top:18px">
          <div class="field">
            <label>Category</label>
            <select id="category" required>
              <option value="">Select a category</option>
              <option>Bag / Luggage</option>
              <option>Wallet / Money</option>
              <option>Phone / Electronics</option>
              <option>Keys</option>
              <option>Jewellery / Watch</option>
              <option>Documents / ID</option>
              <option>Clothing / Accessories</option>
              <option>Toy / Stuffed Animal</option>
              <option>Sports Equipment</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <!-- DESCRIPTION -->
        <div class="field-row single" style="margin-top:18px">
          <div class="field">
			<label>Description</label><br>
            <textarea id="description" name="description" rows="4" cols="30"
			placeholder="Describe the item: colour, brand, features, location..."></textarea>
          </div>
        </div>

        <!-- IMAGE UPLOAD -->
        <div class="field-row single" style="margin-top:18px">
          <div class="field">
            <label>Upload Image (Optional)</label>
            <input type="file" id="item-image" name="item-image" accept="image/*">
          </div>
        </div>

        <!-- ADD BUTTON -->
        <div class="button-row">
            <button type="submit" class="add-btn">Add Item</button>
        </div>
      </form>
    </div>
  </div>
</div>
