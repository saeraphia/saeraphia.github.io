<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="CyberDeck">
    <meta name="description" content="Lost and Found System for UiTM Sarawak KS2">
    <link rel="stylesheet" href="../css/style.css">
    <title>FindIt Portal</title>
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">
            <img src="../assets/images/Find_it_Portal.png" alt="FindIt Portal Logo">
            <span>FindIt Portal</span>
        </a>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </nav>
    </header>

    <!-- LOG IN FORM -->
    <div class="form-container">

        <h2>Log In</h2>

        <form>

            <table>

                <tr>
                    <td>
                        <label for="ID">Student ID:</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="number" id="ID" name="ID" required min="1">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="name">Name:</label>
                    </td>
                <tr>
                    <td>
                        <input type="text" id="name" name="name" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">Password:</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="password" id="password" name="password" required minlength="6">
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        Doesn't have an account?
                        <a href="signup.html">Sign Up</a>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <button type="submit">Sign In</button>
                    </td>
                </tr>

            </table>

        </form>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-content">
        <div class="navigation">
          <h4>Navigation</h4>
          <a href="index.html">Home</a>
          <a href="about us.html">About Us</a>
          <a href="review.html">Reviews</a>
        </div>
        <div class="footer-image">
          <img src="../assets/images/Cyberdesk.png" alt="CyberDesk Logo">
        </div>
      </div>
      <p class="copywrite">© 2026 CyberDeck. All rights reserved.</p>
    </footer>

    <script src="../javascript/anim.js"></script>
</body>
</html>
