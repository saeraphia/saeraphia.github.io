<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Lost and Found System for UiTM Sarawak KS2">
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>FindIt Portal</title>
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">
            <img src="C:\Users\Predator\Desktop\CSC246\Find_It_Logo.jpeg" alt="FindIt Portal Logo">
            <span>FindIt Portal</span>
        </a>
		<i class='bx bx-menu' id="menu-icon"></i>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </nav>
    </header>

    <!-- SIGN UP FORM -->
    <div class="form-container">

      <h2>Sign Up</h2>

      <form>

          <table>

                <tr>
                    <td>
                        <label for="ID">Student ID:</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="number" id="ID" name="ID" required min="1">
                    </td>
                </tr>
                
              <tr>
                  <td>
                      <label for="name">Name:</label>
                  </td>
              </tr>

              <tr>
                  <td>
                      <input type="text" id="name" name="name" required>
                  </td>
              </tr>

              <tr>
                  <td>
                      <label for="email">Email:</label>
                  </td>
              </tr>

              <tr>
                  <td>
                      <input type="email" id="email" name="email" required>
                  </td>
              </tr>

              <tr>
                    <td>
                        <label for="phone">Phone Number:</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="number" id="phone" name="phone" required min="1">
                    </td>
                </tr>

              <tr>
                  <td>
                      <label for="password">Password:</label>
                  </td>
              </tr>

              <tr>
                  <td>
                      <input type="password" id="password" name="password" required minlength="6">
                  </td>
              </tr>

              <tr>
                  <td>
                      <label for="confirmPassword">Confirm Password:</label>
                  </td>
              </tr>

              <tr>
                  <td>
                      <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                  </td>
              </tr>

              <tr>
                  <td class="login-link">
                      Already have an account?
                      <a href="login.html">Log In</a>
                  </td>
              </tr>

              <tr>
                  <td>
                      <button type="submit">
                          Sign Up
                      </button>
                  </td>
              </tr>

          </table>

      </form>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-content">
        <div class="navigation">
          <h4>Navigation</h4>
          <a href="index.html">Home</a>
          <a href="about us.html">About Us</a>
          <a href="review.html">Reviews</a>
        </div>
        <div class="footer-image">
          <img src="../assets/images/Cyberdesk.png" alt="CyberDesk Logo">
        </div>
      </div>
      <p class="copywrite">© 2026 CyberDesk. All rights reserved.</p>
    </footer>

    <script src="anim.js"></script>
</body>
</html>
